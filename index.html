<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habtamu's Science - World Explorer</title>
    <style>
        :root {
            --science-blue: #0984e3;
            --science-green: #00b894;
            --science-purple: #6c5ce7;
            --lab-bg: #dfe6e9;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(120deg, #81ecec 0%, #74b9ff 100%);
            margin: 0;
            padding: 20px;
            transition: all 0.5s ease;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        /* Branding Header */
        header {
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 15px 0px #0984e3;
            margin-bottom: 40px;
            border: 5px solid #2d3436;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--science-purple);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #636e72;
            font-weight: bold;
        }

        /* Lab Controls */
        .lab-station {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-input {
            padding: 15px 30px;
            width: 350px;
            border-radius: 50px;
            border: 4px solid var(--science-purple);
            font-size: 1.2rem;
            outline: none;
        }

        button {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            transition: 0.2s;
            box-shadow: 0 6px 0px rgba(0,0,0,0.2);
        }

        button:active { transform: translateY(4px); box-shadow: none; }

        .btn-teleport { background: #ff7675; }
        .btn-theme { background: #fdcb6e; color: #2d3436; }

        .counter-box {
            background: #2d3436;
            color: #55efc4;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 15px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 1.2rem;
        }

        /* Discovery Cards */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            border: 4px solid #2d3436;
            box-shadow: 10px 10px 0px var(--science-green);
            transition: 0.3s;
        }

        .card:hover { transform: scale(1.03); }

        .flag-circle {
            font-size: 4rem;
            background: #f1f2f6;
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid #dfe6e9;
        }

        .coords-display {
            background: #ffeaa7;
            padding: 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin: 15px 0;
            color: #d35400;
        }

        .visit-btn {
            background: var(--science-blue);
            width: 100%;
        }

        /* Magic Lab Theme */
        .dark-lab {
            background: #2d3436;
        }
        .dark-lab header { background: #636e72; border-color: #55efc4; box-shadow: 0 15px 0px #00b894; }
        .dark-lab h1 { color: #55efc4; }
    </style>
</head>
<body id="labBody">

<div class="container">
    <header>
        <h1>Habtamu's Science 🔬</h1>
        <div class="subtitle">Global Geography Discovery Lab</div>
        <div class="counter-box">Counties Discovered: <span id="count">0</span></div>
    </header>

    <div class="lab-station">
        <input type="text" id="search" class="search-input" placeholder="Find a country to study..." onkeyup="searchLab()">
        <button class="btn-teleport" onclick="randomExplore()">🚀 Random Teleport</button>
        <button class="btn-theme" onclick="toggleLabTheme()">🌈 Toggle Magic Background</button>
    </div>

    <div id="grid"></div>
</div>

<script>
    const countries = [
        // --- EAST AFRICA ---
        { name: "Ethiopia", flag: "🇪🇹", city: "Addis Ababa", lat: "3°N - 15°N", long: "33°E - 48°E", fact: "It is the only country in Africa that was never colonized!" },
        { name: "Kenya", flag: "🇰🇪", city: "Nairobi", lat: "5°S - 5°N", long: "34°E - 42°E", fact: "Home to the world's fastest runners and beautiful lions!" },
        { name: "Tanzania", flag: "🇹🇿", city: "Dodoma", lat: "1°S - 12°S", long: "29°E - 40°E", fact: "Mount Kilimanjaro is the tallest free-standing mountain in the world!" },
        { name: "Uganda", flag: "🇺🇬", city: "Kampala", lat: "1°S - 4°N", long: "29°E - 35°E", fact: "It is known as the 'Pearl of Africa' because of its beauty." },
        { name: "Madagascar", flag: "🇲🇬", city: "Antananarivo", lat: "12°S - 26°S", long: "43°E - 51°E", fact: "90% of the wildlife here is found nowhere else on Earth!" },
        { name: "Mauritius", flag: "🇲🇺", city: "Port Louis", lat: "19°S - 21°S", long: "57°E - 58°E", fact: "It was once the only home of the Dodo bird!" },
        { name: "Rwanda", flag: "🇷🇼", city: "Kigali", lat: "1°S - 3°S", long: "28°E - 31°E", fact: "It is one of the cleanest countries in the world!" },
        
        // --- REST OF AFRICA ---
        { name: "Egypt", flag: "🇪🇬", city: "Cairo", lat: "22°N - 31°N", long: "25°E - 35°E", fact: "Ancient Egyptians invented the 365-day calendar!" },
        { name: "Nigeria", flag: "🇳🇬", city: "Abuja", lat: "4°N - 14°N", long: "3°E - 15°E", fact: "It is the most populous country in Africa!" },
        { name: "South Africa", flag: "🇿🇦", city: "Pretoria", lat: "22°S - 35°S", long: "16°E - 33°E", fact: "It has 11 official languages!" },
        { name: "Morocco", flag: "🇲🇦", city: "Rabat", lat: "27°N - 36°N", long: "1°W - 13°W", fact: "It has the oldest continuously operating university in the world!" },
        { name: "Ghana", flag: "🇬🇭", city: "Accra", lat: "4°N - 11°N", long: "3°W - 1°E", fact: "It was the first country in sub-Saharan Africa to gain independence." },

        // --- ASIA ---
        { name: "Japan", flag: "🇯🇵", city: "Tokyo", lat: "20°N - 45°N", long: "122°E - 153°E", fact: "Japan has the highest number of centenarians (people over 100)!" },
        { name: "India", flag: "🇮🇳", city: "New Delhi", lat: "8°N - 37°N", long: "68°E - 97°E", fact: "India is the place where Chess was invented!" },
        { name: "China", flag: "🇨🇳", city: "Beijing", lat: "18°N - 54°N", long: "73°E - 135°E", fact: "Paper and silk were both invented in China!" },
        { name: "South Korea", flag: "🇰🇷", city: "Seoul", lat: "33°N - 38°N", long: "124°E - 130°E", fact: "The world's first metal printing press was made here!" },
        { name: "Indonesia", flag: "🇮🇩", city: "Jakarta", lat: "11°S - 6°N", long: "95°E - 141°E", fact: "It is made up of over 17,000 islands!" },

        // --- AMERICAS ---
        { name: "USA", flag: "🇺🇸", city: "Washington D.C.", lat: "24°N - 49°N", long: "66°W - 125°W", fact: "The moon landing was controlled from the USA!" },
        { name: "Brazil", flag: "🇧🇷", city: "Brasília", lat: "5°N - 34°S", long: "34°W - 74°W", fact: "The Amazon River carries more water than any other river!" },
        { name: "Canada", flag: "🇨🇦", city: "Ottawa", lat: "41°N - 83°N", long: "52°W - 141°W", fact: "Basketball was invented by a Canadian teacher!" },
        { name: "Mexico", flag: "🇲🇽", city: "Mexico City", lat: "14°N - 33°N", long: "86°W - 118°W", fact: "The world's largest pyramid is actually in Mexico, not Egypt!" },
        { name: "Argentina", flag: "🇦🇷", city: "Buenos Aires", lat: "21°S - 55°S", long: "53°W - 74°W", fact: "It is home to the world's highest dinosaur fossils!" },

        // --- EUROPE ---
        { name: "France", flag: "🇫🇷", city: "Paris", lat: "41°N - 51°N", long: "5°W - 9°E", fact: "The Eiffel Tower was originally intended to be temporary!" },
        { name: "Germany", flag: "🇩🇪", city: "Berlin", lat: "47°N - 55°N", long: "5°E - 15°E", fact: "It has over 20,000 castles!" },
        { name: "United Kingdom", flag: "🇬🇧", city: "London", lat: "49°N - 61°N", long: "8°W - 2°E", fact: "The world's first public railway was built here!" },
        { name: "Italy", flag: "🇮🇹", city: "Rome", lat: "35°N - 47°N", long: "6°E - 19°E", fact: "Italy has the most UNESCO World Heritage Sites in the world!" },
        { name: "Greece", flag: "🇬🇷", city: "Athens", lat: "34°N - 42°N", long: "19°E - 29°E", fact: "The first Olympic Games were held here in 776 BC!" },

        // --- OCEANIA ---
        { name: "Australia", flag: "🇦🇺", city: "Canberra", lat: "10°S - 39°S", long: "113°E - 153°E", fact: "It is the only continent that is also a single country!" },
        { name: "New Zealand", flag: "🇳🇿", city: "Wellington", lat: "34°S - 47°S", long: "166°E - 179°E", fact: "It was the first country to let women vote!" }
    ]; 
    
    ];

    let studiedCount = 0
    const discoveredList = new Set();

    function updateGrid(items) {
        const grid = document.getElementById('grid');
        grid.innerHTML = items.map(c => `
            <div class="card">
                <div class="flag-circle">${c.flag}</div>
                <h2>${c.name}</h2>
                <p><strong>🏙️ Main City:</strong> ${c.city}</p>
                <div class="coords-display">
                    LAT: ${c.lat}<br>LONG: ${c.long}
                </div>
                <button class="visit-btn" onclick="openFact('${c.name}', '${c.fact}')">📖 Learn Science Fact</button>
            </div>
        `).join('');
    }

    function searchLab() {
        const val = document.getElementById('search').value.toLowerCase();
        const filtered = database.filter(c => c.name.toLowerCase().includes(val));
        updateGrid(filtered);
    }

    function openFact(name, fact) {
        alert("🔬 HABTAMU'S SCIENCE FACT for " + name + ":\n\n" + fact);
        if (!discoveredList.has(name)) {
            discoveredList.add(name);
            discoveredCount++;
            document.getElementById('count').innerText = discoveredCount;
        }
    }

    function toggleLabTheme() {
        document.getElementById('labBody').classList.toggle('dark-lab');
    }

    function randomExplore() {
        const r = database[Math.floor(Math.random() * database.length)];
        document.getElementById('search').value = r.name;
        searchLab();
    }

    // Initialize the lab
    updateGrid(database);
</script>

</body>
</html>
